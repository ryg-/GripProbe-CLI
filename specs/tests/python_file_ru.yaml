id: python_file_ru
title: Python File Quoted RU
category: python
language: ru
prompt: |
  Используй shell tool. Выполни ровно эту команду: python3 -c "from pathlib import Path; Path('python-output.txt').write_text('PYTHON_OK\\n')".
  Не повторяй попытку при ошибке.
  Если команда завершится ошибкой, ответь только FAIL.
  Если команда завершится успешно, ответь только DONE.
allowed_tools:
  - shell
artifacts:
  - path: python-output.txt
    kind: text
rules:
  no_retry_on_error: true
  require_exact_command: true
validators:
  - type: file_equals
    target: python-output.txt
    expected: PYTHON_OK
supported_shells:
  - aider
  - gptme
  - continue-cli
  - opencode
supported_formats:
  - markdown
  - tool
tags:
  - multilingual
  - ru
  - non_sanity
