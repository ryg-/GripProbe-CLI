id: json_rank_from_file
title: JSON Rank From File
category: scenario
prompt: |
  Use the shell tool.
  Read search-response.json and required-token.txt from the current workspace.
  From results in search-response.json, select the item with highest score among snippets that contain the exact required token.
  Write search-result.json in the current workspace as JSON with exactly these keys:
  - query
  - selected_id
  - selected_url
  - selected_score
  If successful, reply only DONE.
  If command execution fails, reply only FAIL.
allowed_tools:
  - shell
artifacts:
  - path: search-response.json
    kind: text
  - path: required-token.txt
    kind: text
  - path: search-result.json
    kind: text
validators:
  - type: web_search_result
    target: search-result.json
    expected: '{"query":"weekly plan static fixture checkbox","selected_id":"doc-static-top","selected_url":"https://kb.example/static-top","selected_score":0.98}'
supported_shells:
  - gptme
  - continue-cli
  - opencode
supported_formats:
  - markdown
  - tool
tags:
  - scenario
  - non_sanity
