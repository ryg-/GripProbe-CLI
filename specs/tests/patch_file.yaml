id: patch_file
title: Patch File
category: patch
prompt: |
  Use the patch tool to replace the exact line STATUS=old with STATUS=new in patch-target.txt in the current workspace.
  Do not retry on error.
  If the edit fails, reply only with FAIL.
  If the edit succeeds, reply only with DONE.
allowed_tools:
  - patch
validators:
  - type: patch_applied
    target_file: patch-target.txt
    expected_line: STATUS=new
supported_shells:
  - gptme
  - continue-cli
supported_formats:
  - markdown
  - tool
tags:
  - mvp
