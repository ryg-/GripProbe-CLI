id: shell_date_ru
title: Shell Date RU
category: shell
language: ru
prompt: |
  Используй shell tool. Выполни ровно эту команду: date +%F > date-output.txt.
  Не повторяй попытку при ошибке.
  Если команда завершится ошибкой, ответь только FAIL.
  Если команда завершится успешно, ответь только DONE.
allowed_tools:
  - shell
artifacts:
  - path: date-output.txt
    kind: text
rules:
  no_retry_on_error: true
  require_exact_command: true
validators:
  - type: file_equals
    target: date-output.txt
    expected_from: today
supported_shells:
  - gptme
  - continue-cli
  - opencode
supported_formats:
  - markdown
  - tool
tags:
  - multilingual
  - ru
