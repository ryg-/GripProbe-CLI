id: shell_date_de
title: Shell Date DE
category: shell
language: de
prompt: |
  Verwende das Shell-Tool. Fuehre genau diesen Befehl aus: date +%F > date-output.txt.
  Wiederhole den Vorgang bei einem Fehler nicht.
  Wenn der Befehl fehlschlaegt, antworte nur mit FAIL.
  Wenn der Befehl erfolgreich ist, antworte nur mit DONE.
allowed_tools:
  - shell
artifacts:
  - path: date-output.txt
    kind: text
rules:
  no_retry_on_error: true
  require_exact_command: true
validators:
  - type: file_equals
    target: date-output.txt
    expected_from: today
supported_shells:
  - gptme
  - continue-cli
  - opencode
supported_formats:
  - markdown
  - tool
tags:
  - multilingual
  - de
